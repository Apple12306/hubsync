name: Docker Hub Search

permissions:
  contents: write  # 允许推送代码

on:
  push:
    branches: [ "main"]
    paths:
      - "query"                # 仅当 src 目录下的文件变动时触发
      - "!result.json"          # 排除 result.json 文件
  # schedule:
  #   - cron: '0 0 * * *'  # 每天执行一次
  workflow_dispatch:  # 手动触发

jobs:
  search-dockerhub:
    runs-on: ubuntu-latest
    steps:
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Read query args from file
        id: read_query
        run: |
          if [ -f "query.conf" ]; then
            QUERY=$(cat query.conf)
            echo "::set-output name=query::${QUERY}"
            echo "从query.conf文件读取到搜索关键词: ${QUERY}"
          else
            echo "::set-output name=query::"
            echo "query.conf文件不存在，使用空字符串作为搜索关键词"
          fi

      - name: Run Docker Hub search script
        run: |
          ls
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            python sync.py --query "${{ steps.read_query.outputs.query }}" --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_TOKEN }}
          else
            python sync.py --query "${{ steps.read_query.outputs.query }}"
          fi

      - name: Check for changes
        run: |
          git status
          if git diff --exit-code; then
            echo "changed=false"
            echo "没有文件发生改变，结束工作流"
          else
            echo "changed=true"
            echo "有文件发生改变，继续工作流"
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f "result.json" ]; then
            git add result.json
            git commit -m 'Update Docker Hub search results' || echo "No changes to commit"
            git push || echo "Push failed, but workflow completed"
          else
            echo "result.json not found, skipping commit"
          fi
