name: Docker Hub Search

permissions:
  contents: write  # 允许推送代码
  
on:
  schedule:
    - cron: '0 0 * * *'  # 每天执行一次
  workflow_dispatch:  # 手动触发

jobs:
  search-dockerhub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Docker Hub search script
        run: |
          ls
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            python sync.py --username ${{ secrets.DOCKERHUB_USERNAME }} --password ${{ secrets.DOCKERHUB_TOKEN }}
          else
            python sync.py
          fi

      - name: Check for changes
        run: |
          git status
          if git diff --exit-code; then
            echo "changed=false"
            echo "没有文件发生改变，结束工作流"
          else
            echo "changed=true"
            echo "有文件发生改变，继续工作流"
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f "result.json" ]; then
            git add result.json
            git commit -m 'Update Docker Hub search results' || echo "No changes to commit"
            git push || echo "Push failed, but workflow completed"
          else
            echo "result.json not found, skipping commit"
          fi
